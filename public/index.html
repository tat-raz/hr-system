<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Система</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Кадровый учёт сотрудников</h1>
        
        <div class="filters">
            <input type="text" id="searchName" placeholder="Поиск по ФИО">
            <select id="filterDept">
                <option value="">Все отделы</option>
                <option value="IT">IT</option>
                <option value="HR">HR</option>
                <option value="Sales">Продажи</option>
                <option value="Accounting">Бухгалтерия</option>
            </select>
            <select id="filterPos">
                <option value="">Все должности</option>
                <option value="Manager">Менеджер</option>
                <option value="Developer">Разработчик</option>
                <option value="Accountant">Бухгалтер</option>
            </select>
            <button onclick="loadEmployees()">Применить</button>
            <button class="btn-add" onclick="openModal()">+ Добавить</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>ФИО</th>
                    <th>Отдел</th>
                    <th>Должность</th>
                    <th>Зарплата</th>
                    <th>Статус</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody id="tableBody">
            </tbody>
        </table>

        <div id="modal" class="modal">
            <div class="modal-content">
                <span class="close" onclick="closeModal()">&times;</span>
                <h2 id="modalTitle">Сотрудник</h2>
                <form id="employeeForm">
                    <input type="hidden" id="empId">
                    <input type="text" id="fullName" placeholder="ФИО" required>
                    <input type="date" id="birthDate" placeholder="Дата рождения">
                    <input type="text" id="passport" placeholder="Паспорт (серия/номер)" required>
                    <input type="text" id="contact" placeholder="Контакты (телефон)" required>
                    <input type="text" id="address" placeholder="Адрес">
                    <input type="text" id="department" placeholder="Отдел" required>
                    <input type="text" id="position" placeholder="Должность" required>
                    <input type="number" id="salary" placeholder="Зарплата" required>
                    <input type="date" id="hireDate" placeholder="Дата приёма">
                    <button type="submit">Сохранить</button>
                </form>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
